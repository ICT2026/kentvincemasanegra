<!DOCTYPE html>

<head>

<style>
body{
    margin:0;
    font-family:Inter,Arial;
    background:#0f1115;
    color:#fff;
}

/* ===== HEADER ===== */
header{
    padding:15px 25px;
    background:#12141a;
    border-bottom:1px solid #23262f;
}
.back-btn{
    text-decoration:none;
    color:white;
    padding:8px 18px;
    border-radius:30px;
    border:1px solid #3a3f4b;
}
.back-btn:hover{
    background:#4da3ff;
}

/* ===== MAIN ===== */
.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

/* ===== CARD ===== */
.card{
    background:#171a21;
    border:1px solid #23262f;
    border-radius:14px;
    padding:20px;
    margin-bottom:20px;
}

/* INPUTS */
input,textarea{
    width:100%;
    margin:8px 0;
    padding:12px;
    border-radius:8px;
    border:1px solid #2b2f38;
    background:#0f1115;
    color:white;
}

textarea{resize:none;height:90px;}

button{
    padding:10px 20px;
    border:none;
    border-radius:30px;
    background:#4da3ff;
    color:white;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    box-shadow:0 0 12px rgba(77,163,255,.6);
}

/* ===== POSTS ===== */
.post{
    display:flex;
    gap:15px;
    margin-bottom:18px;
    background:#12141a;
    border-radius:12px;
    padding:15px;
    border:1px solid #23262f;
}

.avatar{
    width:45px;
    height:45px;
    border-radius:50%;
}

.post-header{
    font-weight:600;
}

.time{
    font-size:12px;
    color:#9aa0aa;
}

.admin-reply{
    margin-top:10px;
    padding:10px;
    background:#0f172a;
    border-left:3px solid #4da3ff;
    border-radius:6px;
}

.delete-btn{
    margin-top:8px;
    background:#ff4d4d;
}
</style>
</head>

<body>

<header>
<a href="impact.html" class="back-btn">← Back</a>
</header>

<div class="container">

<h2>Community Feedback</h2>

<!-- REGISTER / LOGIN -->
<div class="card" id="authBox">
<h3>Start Posting</h3>

<input id="fname" placeholder="First Name">
<input id="mname" placeholder="Middle Name">
<input id="lname" placeholder="Last Name">
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register / Login</button>
</div>

<!-- POST BOX -->
<div class="card" id="postBox" style="display:none;">
<h3>Write a Comment</h3>
<textarea id="commentText" placeholder="Share your thoughts..."></textarea>
<button onclick="addPost()">Send</button>
</div>

<!-- POSTS LIST -->
<div id="posts"></div>

</div>

<script>

/* ===== ADMIN ACCOUNT ===== */
const ADMIN_USER="admin";
const ADMIN_PASS="admin123";

/* ===== USER SESSION ===== */
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(currentUser){
    document.getElementById("authBox").style.display="none";
    document.getElementById("postBox").style.display="block";
}

/* ===== REGISTER / LOGIN ===== */
function register(){
    const user={
        name:
        fname.value+" "+mname.value+" "+lname.value,
        username:username.value,
        password:password.value
    };

    localStorage.setItem("currentUser",JSON.stringify(user));
    location.reload();
}

/* ===== LOAD POSTS ===== */
let posts = JSON.parse(localStorage.getItem("posts")) || [];

function savePosts(){
    localStorage.setItem("posts",JSON.stringify(posts));
}

/* ===== ADD POST ===== */
function addPost(){
    if(!currentUser){
        alert("Login first!");
        return;
    }

    const text=document.getElementById("commentText").value;

    const post={
        id:Date.now(),
        user:currentUser.name,
        username:currentUser.username,
        text:text,
        time:new Date().toLocaleString(),
        reply:""
    };

    posts.unshift(post);
    savePosts();
    renderPosts();
    commentText.value="";
}

/* ===== ADMIN REPLY ===== */
function replyPost(id){
    const reply=prompt("Admin reply:");
    if(!reply) return;

    posts.find(p=>p.id===id).reply=reply;
    savePosts();
    renderPosts();
}

/* ===== DELETE ===== */
function deletePost(id){
    posts=posts.filter(p=>p.id!==id);
    savePosts();
    renderPosts();
}

/* ===== RENDER ===== */
function renderPosts(){
    const container=document.getElementById("posts");
    container.innerHTML="";

    posts.forEach(p=>{
        container.innerHTML+=`
        <div class="post">
            <img class="avatar"
            src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

            <div>
                <div class="post-header">${p.user}</div>
                <div class="time">${p.time}</div>
                <p>${p.text}</p>

                ${p.reply ?
                `<div class="admin-reply"><b>Admin:</b> ${p.reply}</div>` : ""}

                ${
                currentUser &&
                currentUser.username===ADMIN_USER ?
                `
                <button onclick="replyPost(${p.id})">Reply</button>
                <button class="delete-btn"
                onclick="deletePost(${p.id})">Delete</button>
                `
                : ""
                }
            </div>
        </div>`;
    });
}

renderPosts();

</script>

</body>
</html>
