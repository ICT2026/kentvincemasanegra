<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Feedback</title>

<link rel="icon" href="image/kentlogo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0f1115;
    --card:#171a21;
    --border:#23262f;
    --text:#ffffff;
    --accent:#4da3ff;
}

/* LIGHT MODE AUTO */
@media (prefers-color-scheme: light){
    :root{
        --bg:#f4f6fb;
        --card:#ffffff;
        --border:#d9dde7;
        --text:#111827;
        --accent:#2563eb;
    }
}
    
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:.4s;

    /* ✅ ADD THESE */
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
header{
    padding:15px 25px;
    background:#12141a;
    border-bottom:1px solid #23262f;
}

.back-btn{
    color:white;
    text-decoration:none;
    padding:8px 18px;
    border-radius:30px;
    border:1px solid #3a3f4b;
}
.back-btn:hover{background:#4da3ff}

.admin-badge{
    margin-left:8px;
    font-size:12px;
    padding:3px 8px;
    border-radius:20px;
    background:linear-gradient(90deg,#ffd700,#ffae00);
    color:#000;
    font-weight:700;
    box-shadow:0 0 10px rgba(255,215,0,.8);
    animation:adminGlow 2s infinite alternate;
}

@keyframes adminGlow{
    from{box-shadow:0 0 6px rgba(255,215,0,.5);}
    to{box-shadow:0 0 18px rgba(255,215,0,1);}
}
    
/* DASHBOARD */
.dashboard{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
    flex:1;
}

.posts-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:22px;
}

/* POST CARD */
.post-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    padding:20px;
    transition:.35s cubic-bezier(.22,1,.36,1);
    position:relative;
    overflow:hidden;
}

.post-card::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(77,163,255,.15),
        transparent
    );
    opacity:0;
    transition:.4s;
}

.post-card:hover{
    transform:translateY(-8px);
    box-shadow:0 25px 55px rgba(0,0,0,.6);
}

.post-card:hover::after{
    opacity:1;
}

.post-top{
    display:flex;
    gap:12px;
    align-items:center;
}

.avatar{
    width:45px;
    height:45px;
    border-radius:50%;
}

.username{font-weight:600}
.time{font-size:12px;color:#9aa0aa}

.admin-reply{
    margin-top:12px;
    padding:10px;
    background:#0f172a;
    border-left:3px solid #4da3ff;
    border-radius:6px;
}

/* FLOAT BUTTON */
.floating-btn{
    position:fixed;
    right:25px;
    bottom:25px;
    background:#4da3ff;
    border:none;
    padding:16px 22px;
    border-radius:50px;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 0 20px rgba(77,163,255,.5);
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    backdrop-filter:blur(6px);
    display:none;
    justify-content:center;
    align-items:center;
    animation:fadeIn .3s ease;
}

/* animated glowing border */
.modal-content{
    width:92%;
    max-width:420px;
    padding:30px;
    border-radius:20px;
    position:relative;
    background:
        linear-gradient(var(--card),var(--card)) padding-box,
        linear-gradient(120deg,#4da3ff,#00ffd5,#4da3ff) border-box;
    border:2px solid transparent;
    backdrop-filter:blur(18px);
    box-shadow:
        0 0 40px rgba(77,163,255,.25),
        0 20px 70px rgba(0,0,0,.6);
}

@keyframes modalPop{
    from{
        opacity:0;
        transform:scale(.85) translateY(20px);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.modal-content::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:20px;
    background:radial-gradient(
        circle at top,
        rgba(77,163,255,.25),
        transparent 60%
    );
    pointer-events:none;
    animation:glowPulse 4s ease-in-out infinite;
}

@keyframes glowPulse{
    0%,100%{opacity:.4;}
    50%{opacity:.9;}
}
input,
textarea{
    display:block;
    width:100%;
    box-sizing:border-box;
    margin:10px 0;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--border);
    background:rgba(0,0,0,.25);
    color:var(--text);
    font-size:14px;
}

textarea{
    width:100%;
    min-height:85px;
    max-height:120px;
    resize:none;
    overflow:auto;
    padding:12px;
    border-radius:10px;
    border:1px solid #2b2f38;
    background:#0f1115;
    color:white;
    font-size:14px;
}

button{
    border:none;
    padding:12px;
    border-radius:30px;
    background:#4da3ff;
    color:white;
    font-weight:600;
    cursor:pointer;
}

.delete-btn{
    background:#ff4d4d;
    margin-top:8px;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(25px)}
to{opacity:1;transform:translateY(0)}
}

.primary-btn{
    width:100%;
    background:linear-gradient(135deg,#4da3ff,#2563eb);
    border:none;
    padding:13px;
    border-radius:12px;
    font-weight:600;
    letter-spacing:.3px;
    transition:.25s;
}

.primary-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 8px 20px rgba(77,163,255,.35);
}

.link-action{
    color:var(--accent);
    cursor:pointer;
    text-decoration:underline;
    font-weight:500;
    transition:.2s;
}

.link-action:hover{
    opacity:.7;
}

.post-actions{
    margin-top:10px;
}

.like-btn{
    background:#1f2937;
    border-radius:20px;
    padding:6px 14px;
    font-size:14px;
    transition:.2s;
}

.like-btn:hover{
    background:#ef4444;
}

.like-btn:active{
    transform:scale(1.25);
}

.google-btn{
    width:100%;
    background:#fff;
    color:#444;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    border-radius:10px;
    padding:10px;
    font-weight:600;
}

.google-btn img{
    width:18px;
}

.post-status{
    font-size:13px;
    margin-bottom:8px;
    min-height:18px;
    color:#ffb020;
    font-weight:500;
}
.post-status.success{
    color:#22c55e;
}
.post-status.error{
    color:#ff4d4d;
}

.delete-icon{
    position:absolute;
    top:12px;
    right:12px;
    cursor:pointer;
    font-size:18px;
    opacity:.7;
    transition:.2s;
}
    
.delete-icon:hover{
    opacity:1;
    transform:scale(1.2);
}
    
</style>
</head>

<body>

<header style="display:flex;justify-content:space-between;align-items:center;">
<a href="impact.html" class="back-btn">← Back</a>

<div id="authArea">
    <button id="loginBtn" onclick="openLogin()">Login</button>

    <button id="logoutBtn"
        onclick="logout()"
        style="display:none;background:#ff4d4d;">
        ⎋ Logout
    </button>
</div>
</header>
    
<div class="dashboard">
<h2>Community Feedback</h2>
<div class="posts-grid" id="posts"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<div id="authBox">
<h3>Login</h3>

<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">

<button class="primary-btn" onclick="emailLogin()">Login</button>
    
<p style="text-align:center;margin:10px 0;">— or —</p>

<p style="text-align:center;margin-top:12px;">
    <span class="link-action" onclick="showRegister()">
        Create an account
    </span>
</p>
    
<button class="google-btn" onclick="googleLogin()">
<img src="https://developers.google.com/identity/images/g-logo.png">
Continue with Google
</button>
</div>

<div id="registerBox" style="display:none;">
<h3>Create Account</h3>
<p class="link-action" onclick="openLogin()">← Back to Login</p>

<input id="fname" placeholder="First Name">
<input id="mname" placeholder="Middle Name">
<input id="lname" placeholder="Last Name">
<input id="loginUsername" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="primary-btn" onclick="register()">Create Account</button>
</div>

<div id="postBox" style="display:none;">
<h3>Write a Comment</h3>

<div id="postStatus" class="post-status"></div>
<textarea id="commentText"
placeholder="Share your thoughts..."></textarea>
<button id="sendBtn" onclick="addPost()">Send</button>
</div>

</div>
</div>

<!-- ✅ FIREBASE SCRIPT -->
<script type="module">

/* ================= FIREBASE IMPORT ================= */
import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
serverTimestamp,
doc,
updateDoc,
deleteDoc,
arrayUnion,
arrayRemove
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged,
signOut
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyAuYZ68uU9Iw8rN-0Kfm3Wzul2vpJMD6XE",
  authDomain: "kent-da153.firebaseapp.com",
  projectId: "kent-da153",
  storageBucket: "kent-da153.firebasestorage.app",
  messagingSenderId: "386160813839",
  appId: "1:386160813839:web:b3f6e6ca211e9b742b007a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const googleProvider = new GoogleAuthProvider();

let currentUser = null;
let isAdmin = false;
let lastPostTime = 0; // anti‑spam timer
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const createPostBtn =
document.getElementById("createPostBtn");
    
window.openLogin = () => {
    modal.style.display="flex";
    authBox.style.display="block";
    registerBox.style.display="none";
    postBox.style.display="none";
};

window.showRegister = ()=>{
    authBox.style.display="none";
    registerBox.style.display="block";
};
    
/* MODAL */
const modal = document.getElementById("modal");

window.openModal = () => {
    if(!currentUser){
        openLogin();
        return;
    }

    modal.style.display="flex";
    authBox.style.display="none";
    registerBox.style.display="none";
    postBox.style.display="block";
};

/* ADD POST */
window.addPost = async () => {

 const status = document.getElementById("postStatus");
 const sendBtn = document.getElementById("sendBtn");

 if(!currentUser){
    status.className="post-status error";
    status.textContent="⚠ Please login first.";
    return;
 }

 const now = Date.now();
 let wait = 10000 - (now - lastPostTime);

 /* ===== COOLDOWN TIMER ===== */
 if(wait > 0){
    sendBtn.disabled = true;

    const timer = setInterval(()=>{
        wait -= 1000;
        status.textContent =
        `⏳ Wait ${Math.ceil(wait/1000)}s`;

        if(wait <= 0){
            clearInterval(timer);
            sendBtn.disabled = false;
            status.textContent="";
        }
    },1000);

    return;
 }

 const text = commentText.value.trim();
 if(!text){
    status.className="post-status error";
    status.textContent="Write something first.";
    return;
 }

 await addDoc(collection(db,"posts"),{
   name: currentUser.displayName || currentUser.email,
   username: currentUser.email,
   userPhoto: currentUser.photoURL ||
   "https://cdn-icons-png.flaticon.com/512/7175/7175408.png",
   text:text,
   likedBy: [],
   reply:"",
   time:serverTimestamp()
 });

 lastPostTime = now;
 commentText.value="";
 status.className="post-status success";
 status.textContent="✅ Posted successfully!";

 setTimeout(()=>{
     modal.style.display="none";
     status.textContent="";
 },900);
};

/* REALTIME POSTS */
const postsContainer=document.getElementById("posts");
const q=query(collection(db,"posts"),orderBy("time","desc"));

onSnapshot(q,(snapshot)=>{
 postsContainer.innerHTML="";

 snapshot.forEach(docSnap=>{
   const p=docSnap.data();
   const id=docSnap.id;

   const card=document.createElement("div");
   card.className="post-card";
   const liked =
   (p.likedBy || []).includes(currentUser?.uid);

   card.innerHTML=`
   ${isAdmin ? `
<div class="delete-icon"
onclick="deletePost('${id}')">🗑️</div>
` : ""}

   <div class="post-top">
     <img class="avatar"
     src="${p.userPhoto || 'https://cdn-icons-png.flaticon.com/512/7175/7175408.png'}">
     <div>
       <div class="username">
  ${p.name}
  ${p.username === "adminken@gmail.com"
     ? `<span class="admin-badge">👑 Admin</span>`
     : ""}
</div>
       <div class="time">
         ${p.time?.toDate().toLocaleString() || ""}
       </div>
     </div>
   </div>

   <p>${p.text}</p>

<div class="post-actions">
<button class="like-btn"
onclick="toggleLike('${id}', ${JSON.stringify(p.likedBy || [])})">
${liked ? "❤️" : "🤍"} ${(p.likedBy || []).length}
</button>
</div>

   ${p.reply ?
     `<div class="admin-reply"><b>Admin:</b> ${p.reply}</div>`:""}

   ${
     isAdmin ?
     `
     <button onclick="replyPost('${id}')">Reply</button>
     <button class="delete-btn"
     onclick="deletePost('${id}')">Delete</button>
     `:""
   }
   `;

   postsContainer.appendChild(card);
 });
});
    
/* ADMIN REPLY */
window.replyPost=async(id)=>{
 const reply=prompt("Admin reply:");
 if(!reply) return;

 await updateDoc(doc(db,"posts",id),{
   reply:reply
 });
}

/* DELETE */
window.deletePost=async(id)=>{
 if(!confirm("Delete post?")) return;
 await deleteDoc(doc(db,"posts",id));
}

window.toggleLike = async (postId, likedBy=[]) => {

    if(!currentUser){
        alert("Login to like posts");
        return;
    }

    const ref = doc(db,"posts",postId);
    const uid = currentUser.uid;
    const alreadyLiked = likedBy.includes(uid);

    await updateDoc(ref,{
        likedBy: alreadyLiked
            ? arrayRemove(uid)
            : arrayUnion(uid)
    });
};
    
const modalContent = document.querySelector(".modal-content");

modal.addEventListener("click",(e)=>{
    if(!modalContent.contains(e.target)){
        modal.style.display="none";
    }
});

/* ================= GOOGLE LOGIN ================= */
window.googleLogin = async () => {
    await signInWithPopup(auth, googleProvider);
};

onAuthStateChanged(auth,(user)=>{
    if(user){
        currentUser = user;
        isAdmin = user.email === "adminken@gmail.com";

        loginBtn.style.display="none";
        logoutBtn.style.display="inline-block";

        modal.style.display="none"; // auto close modal
    }else{
        currentUser=null;
        isAdmin=false;
        loginBtn.style.display="inline-block";
        logoutBtn.style.display="none";
    }

const createPostBtn =
document.getElementById("createPostBtn");

if(createPostBtn){
    createPostBtn.style.display =
        user ? "block" : "none";
}
    
});
    
/* ================= EMAIL LOGIN ================= */
window.emailLogin = async () => {
const email = loginUsername.value;
const pass = loginPassword.value;
const postStatus =
document.getElementById("postStatus");

try{
await signInWithEmailAndPassword(auth,email,pass);

postStatus.className="post-status success";
postStatus.textContent="✅ Login successful (3)";

let c=3;
const t=setInterval(()=>{
c--;
postStatus.textContent=
`✅ Login successful (${c})`;

if(c===0){
clearInterval(t);
modal.style.display="none";
postStatus.textContent="";
}
},1000);

}catch{
postStatus.className="post-status error";
postStatus.textContent="Invalid account.";
}
};

/* ================= REGISTER ================= */
window.register = async ()=>{
    const email = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    try{
        await createUserWithEmailAndPassword(auth,email,pass);
    }catch(err){
        alert(err.message);
    }
};

/* ================= LOGOUT ================= */
window.logout = ()=>{
    signOut(auth);
};

/* ===== SECRET ADMIN PANEL ===== */

let keysPressed = {};

document.addEventListener("keydown",(e)=>{
    keysPressed[e.key.toLowerCase()] = true;

    if(keysPressed["control"] && keysPressed["z"] && e.code==="Space"){
        if(isAdmin){
            alert("Admin Mode Activated ✅");
        }else{
            alert("Not authorized");
        }
    }
});

document.addEventListener("keyup",(e)=>{
    delete keysPressed[e.key.toLowerCase()];
});
    
</script>

<button id="createPostBtn"
class="floating-btn"
onclick="openModal()">
✏️ Create Post
</button>
    
<footer style="
text-align:center;
padding:20px;
margin-top:40px;
opacity:.7;
font-size:14px;">
© 2026 Kent Vince S. Masanegra || All Rights Reserved
</footer>
    
</body>
</html>
